<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Registrar - LtdaFinder Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="login-page">

    <div class="login-card">

        <img
            src="{{ url_for('static', filename='logo.png') }}"
            alt="LtdaFinder Pro"
            class="login-logo"
        >

        <h1>Criar Conta</h1>
        <p>Cadastre um novo usuário para acessar o sistema.</p>

        {% if erro %}
        <div class="login-erro">
            {{ erro }}
        </div>
        {% endif %}

        {% if sucesso %}
        <div class="login-sucesso">
            {{ sucesso }}
        </div>
        {% endif %}

        <form method="post">

            <label>Usuário</label>
            <input
                type="text"
                name="usuario"
                placeholder="Digite um usuário"
                required
            >

            <label>Senha</label>
            <input
                type="password"
                name="senha"
                placeholder="Digite uma senha"
                required
            >

            <label>Confirmar senha</label>
            <input
                type="password"
                name="confirmar"
                placeholder="Repita a senha"
                required
            >

            <button type="submit">
                Registrar
            </button>

        </form>

        <div class="login-links">
            Já possui uma conta?

            <a href="/login">
                Fazer login
            </a>
        </div>

    </div>

</div>

</body>
</html>
